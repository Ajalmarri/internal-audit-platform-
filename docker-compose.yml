version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: audit_platform
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: audit_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/001-create-audit-plans.sql:/docker-entrypoint-initdb.d/001-create-audit-plans.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_user -d audit_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Internal Audit Platform Application
  internal-audit-platform:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - UPLOAD_DIR=/app/uploads
      - DATABASE_URL=postgresql://audit_user:audit_password@postgres:5432/audit_platform
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data: 