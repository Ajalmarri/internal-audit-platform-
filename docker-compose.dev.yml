version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: audit_platform
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: audit_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/001-create-audit-plans.sql:/docker-entrypoint-initdb.d/001-create-audit-plans.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_user -d audit_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Internal Audit Platform Application
  internal-audit-platform:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - UPLOAD_DIR=/app/uploads
      - DATABASE_URL=postgresql://audit_user:audit_password@postgres:5432/audit_platform
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads:rw
      - ./data:/app/data:rw
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "dev"]
    restart: unless-stopped

volumes:
  postgres_data: 